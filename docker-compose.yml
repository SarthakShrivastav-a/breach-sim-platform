services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://breach:breach@postgres:5432/breach}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - control
      - lab

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - control

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - control
      - lab
    profiles:
      - worker

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-breach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-breach}
      POSTGRES_DB: ${POSTGRES_DB:-breach}
    ports:
      - "5432:5432"
    networks:
      - control

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - control

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-BreachSimAlpha123!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - control

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - control

  attacker:
    image: alpine:3.20
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    networks:
      - lab

  linux-victim:
    image: nginx:1.27-alpine
    networks:
      - lab

networks:
  control:
  lab:
    ipam:
      config:
        - subnet: 172.28.0.0/16
