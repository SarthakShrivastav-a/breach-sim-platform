name: Docker Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - dev
      - main

jobs:
  publish:
    if: github.event.pull_request.merged == true && vars.ENABLE_DOCKER_PUBLISH == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install YAML parser
        run: python -m pip install PyYAML
      - name: Resolve Docker repository
        id: docker_repo
        run: |
          repo=$(python - <<'PY'
          import yaml
          print(yaml.safe_load(open("config/app.yaml"))["docker"]["image_repository"])
          PY
          )
          if [ -z "$repo" ]; then
            echo "docker.image_repository is not configured"
            exit 1
          fi
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and publish
        run: |
          short_sha=$(git rev-parse --short HEAD)
          base="${{ steps.docker_repo.outputs.repo }}"
          if [ "${{ github.base_ref }}" = "main" ]; then
            docker build -f backend/Dockerfile -t "$base:main-$short_sha" -t "$base:latest" .
            docker push "$base:main-$short_sha"
            docker push "$base:latest"
          else
            docker build -f backend/Dockerfile -t "$base:dev-$short_sha" -t "$base:dev-latest" .
            docker push "$base:dev-$short_sha"
            docker push "$base:dev-latest"
          fi
