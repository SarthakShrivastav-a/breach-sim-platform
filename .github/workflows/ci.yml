name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt -r worker/requirements.txt
      - name: Run backend and worker tests
        run: pytest backend/tests worker/tests
      - name: Validate Docker Compose
        run: docker compose config --quiet

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Test frontend
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t breach-sim-backend:test .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t breach-sim-frontend:test .
      - name: Build worker image
        run: docker build -f worker/Dockerfile -t breach-sim-worker:test .

